name: CI
on: [push, pull_request]
permissions: {contents: read}
jobs:
  test:
    runs-on: ubuntu-latest
    strategy: {fail-fast: false, matrix: {java: ['17','21']}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '${{ matrix.java }}'}
      - uses: DeLaGuardo/setup-clojure@13.1
        with: {cli: latest, github-token: '${{ secrets.GITHUB_TOKEN }}'}
      - uses: actions/cache@v4
        with: {path: '~/.m2\n~/.gitlibs', key: '${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles(''deps.edn'') }}'}
      - run: clojure -M:test
      - run: clojure -M:lint
